<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course List</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="Browse and filter courses by category, level, and more." />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Course List</h1>
      <p>Find courses by character design, VFX, rigging, animation, rendering, and more.</p>
    </div>
  </header>
  <main class="container">
    <section class="filters" aria-label="Course Filters">
      <input id="search" type="text" placeholder="Search courses by title or software..." />
      <select id="category" aria-label="Category filter"><option value="">All Categories</option></select>
      <select id="level" aria-label="Level filter">
        <option value="">All Levels</option>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
    </section>

    <section id="courses" class="courses-grid" aria-label="Courses"></section>
  </main>
  <footer class="container" style="text-align:center; padding:2rem 0; color:#666; font-size:0.9rem">
    © Course List Demo
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
